<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sapphire Clinics East — Logo Intro</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #04090B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif;
    }

    /* ─── Scene Container ──────────────────────────────────────── */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 60% 55% at 50% 50%,
        #0B2A31 0%,
        #061418 45%,
        #04090B 100%);
    }

    /* ─── Background particle glow ─────────────────────────────── */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(26,123,138,0.12) 0%,
        rgba(26,123,138,0.04) 50%,
        transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: glowPulse 4s ease-in-out infinite;
      animation-delay: 0.5s;
      opacity: 0;
    }

    @keyframes glowPulse {
      0%   { opacity: 0;   transform: translate(-50%,-50%) scale(0.8); }
      40%  { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
      70%  { opacity: 0.7; transform: translate(-50%,-50%) scale(1.0); }
      100% { opacity: 0.8; transform: translate(-50%,-50%) scale(1.05); }
    }

    /* ─── Logo Wrapper ──────────────────────────────────────────── */
    .logo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Main SVG Logo ─────────────────────────────────────────── */
    #logo-svg {
      width: 280px;
      height: 280px;
      overflow: visible;
    }

    /* ─── Path Animation Engine ─────────────────────────────────── */

    /* Outer Diamond — perimeter ≈ 4 × (88√2) ≈ 498 */
    #outer-diamond {
      fill: none;
      stroke: #1A7B8A;
      stroke-width: 5.5;
      stroke-linejoin: miter;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      filter: drop-shadow(0 0 4px rgba(26,123,138,0.6));
      animation: drawPath 1.4s cubic-bezier(0.4,0,0.2,1) forwards;
      animation-delay: 0.3s;
    }

    /* Inscribed Square — perimeter = 4 × 88 = 352 */
    #inscribed-square {
      fill: none;
      stroke: #1A7B8A;
      stroke-width: 4.2;
      stroke-linejoin: miter;
      stroke-dasharray: 354;
      stroke-dashoffset: 354;
      filter: drop-shadow(0 0 3px rgba(26,123,138,0.5));
      animation: drawPath 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
      animation-delay: 0.9s;
    }

    /* Inner Diamond — perimeter = 4 × (44√2) ≈ 249 */
    #inner-diamond {
      fill: none;
      stroke: #1A7B8A;
      stroke-width: 3.2;
      stroke-linejoin: miter;
      stroke-dasharray: 250;
      stroke-dashoffset: 250;
      filter: drop-shadow(0 0 2px rgba(26,123,138,0.4));
      animation: drawPath 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
      animation-delay: 1.5s;
    }

    /* Facet line group — each line ≈ 44 units */
    .facet-line {
      fill: none;
      stroke: #1A7B8A;
      stroke-linecap: square;
      opacity: 0;
      animation: fadeInLine 0.4s ease forwards;
    }
    .facet-line.cardinal  { stroke-width: 2.2; }
    .facet-line.diagonal  { stroke-width: 1.8; }

    .facet-line:nth-child(1)  { animation-delay: 2.1s; }
    .facet-line:nth-child(2)  { animation-delay: 2.18s; }
    .facet-line:nth-child(3)  { animation-delay: 2.26s; }
    .facet-line:nth-child(4)  { animation-delay: 2.34s; }
    .facet-line:nth-child(5)  { animation-delay: 2.42s; }
    .facet-line:nth-child(6)  { animation-delay: 2.50s; }
    .facet-line:nth-child(7)  { animation-delay: 2.58s; }
    .facet-line:nth-child(8)  { animation-delay: 2.66s; }
    .facet-line:nth-child(9)  { animation-delay: 2.74s; }
    .facet-line:nth-child(10) { animation-delay: 2.82s; }
    .facet-line:nth-child(11) { animation-delay: 2.90s; }
    .facet-line:nth-child(12) { animation-delay: 2.98s; }

    /* Center Table Diamond */
    #center-table {
      fill: #1A7B8A;
      stroke: none;
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(26,123,138,0.9)) drop-shadow(0 0 16px rgba(42,170,187,0.5));
      animation: centerPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      animation-delay: 3.1s;
    }

    /* ─── Keyframe Definitions ──────────────────────────────────── */
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fadeInLine {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes centerPop {
      0%   { opacity: 0; transform: scale(0);    }
      60%  { opacity: 1; transform: scale(1.4);  }
      80%  { opacity: 1; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1.0);  }
    }

    /* ─── Mark Shimmer (post-assembly) ─────────────────────────── */
    #logo-mark-group {
      animation: markShimmer 2s ease 3.6s infinite alternate;
    }

    @keyframes markShimmer {
      0%   { filter: drop-shadow(0 0 3px rgba(26,123,138,0.4)); }
      100% { filter: drop-shadow(0 0 12px rgba(42,170,187,0.7)); }
    }

    /* ─── Wordmark ──────────────────────────────────────────────── */
    .wordmark-container {
      text-align: center;
      margin-top: 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: wordmarkIn 0.9s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      animation-delay: 3.4s;
    }

    @keyframes wordmarkIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .wordmark-primary {
      display: block;
      color: #FFFFFF;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      line-height: 1;
      text-transform: uppercase;
    }

    .wordmark-rule {
      display: block;
      width: 180px;
      height: 1px;
      background: rgba(26,123,138,0.6);
      margin: 10px auto;
    }

    .wordmark-secondary {
      display: block;
      color: rgba(255,255,255,0.75);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    /* ─── Tagline ───────────────────────────────────────────────── */
    .tagline {
      margin-top: 22px;
      opacity: 0;
      transform: translateY(10px);
      animation: wordmarkIn 0.8s ease forwards;
      animation-delay: 4.2s;
      text-align: center;
    }

    .tagline span {
      display: inline-block;
      color: rgba(26,123,138,0.9);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ─── Corner decorations ────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      opacity: 0;
      animation: fadeInLine 0.5s ease forwards;
      animation-delay: 4.0s;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(26,123,138,0.5);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }

    .corner.tl { top: 32px; left: 32px; }
    .corner.tr { top: 32px; right: 32px; transform: scaleX(-1); }
    .corner.bl { bottom: 32px; left: 32px; transform: scaleY(-1); }
    .corner.br { bottom: 32px; right: 32px; transform: scale(-1); }

    /* ─── Replay button ─────────────────────────────────────────── */
    .replay-btn {
      position: absolute;
      bottom: 32px;
      right: 32px;
      background: transparent;
      border: 1px solid rgba(26,123,138,0.5);
      color: rgba(26,123,138,0.8);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      padding: 8px 18px;
      cursor: pointer;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.3s ease;
      animation: fadeInLine 0.5s ease 5s forwards;
      font-family: inherit;
    }
    .replay-btn:hover {
      background: rgba(26,123,138,0.15);
      border-color: rgba(26,123,138,0.9);
      color: #1A7B8A;
    }

    /* ─── Embed info note ───────────────────────────────────────── */
    .embed-note {
      position: absolute;
      bottom: 32px;
      left: 32px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="scene">

    <!-- Background ambient glow -->
    <div class="bg-glow"></div>

    <!-- Corner frame decorations -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- ── Logo wrapper ── -->
    <div class="logo-wrapper">

      <!-- Mark SVG -->
      <svg id="logo-svg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
        <g id="logo-mark-group">

          <!-- Level 1: Outer Diamond -->
          <polygon id="outer-diamond"
            points="0,-88 88,0 0,88 -88,0"/>

          <!-- Level 2: Inscribed Square -->
          <polygon id="inscribed-square"
            points="44,-44 44,44 -44,44 -44,-44"/>

          <!-- Level 3: Inner Diamond -->
          <polygon id="inner-diamond"
            points="0,-44 44,0 0,44 -44,0"/>

          <!-- Facet lines group -->
          <g id="facet-group">
            <!-- Cardinal lines (outer → inner) -->
            <line class="facet-line cardinal" x1="0"   y1="-88" x2="0"   y2="-44"/>
            <line class="facet-line cardinal" x1="88"  y1="0"   x2="44"  y2="0"/>
            <line class="facet-line cardinal" x1="0"   y1="88"  x2="0"   y2="44"/>
            <line class="facet-line cardinal" x1="-88" y1="0"   x2="-44" y2="0"/>
            <!-- Diagonal lines (square corners → inner diamond) -->
            <line class="facet-line diagonal" x1="44"  y1="-44" x2="44"  y2="0"/>
            <line class="facet-line diagonal" x1="44"  y1="-44" x2="0"   y2="-44"/>
            <line class="facet-line diagonal" x1="44"  y1="44"  x2="44"  y2="0"/>
            <line class="facet-line diagonal" x1="44"  y1="44"  x2="0"   y2="44"/>
            <line class="facet-line diagonal" x1="-44" y1="44"  x2="-44" y2="0"/>
            <line class="facet-line diagonal" x1="-44" y1="44"  x2="0"   y2="44"/>
            <line class="facet-line diagonal" x1="-44" y1="-44" x2="-44" y2="0"/>
            <line class="facet-line diagonal" x1="-44" y1="-44" x2="0"   y2="-44"/>
          </g>

          <!-- Center table diamond -->
          <polygon id="center-table"
            points="0,-14 14,0 0,14 -14,0"/>

        </g>
      </svg>

      <!-- Wordmark -->
      <div class="wordmark-container">
        <span class="wordmark-primary">Sapphire</span>
        <span class="wordmark-rule"></span>
        <span class="wordmark-secondary">Clinics East, Inc.</span>
      </div>

      <!-- Tagline -->
      <div class="tagline">
        <span>Rehab for Every Age, Every Stage.</span>
      </div>

    </div><!-- /logo-wrapper -->

    <!-- Replay -->
    <button class="replay-btn" onclick="replayIntro()">↺ &nbsp;Replay</button>

    <!-- Embed note -->
    <div class="embed-note">Sapphire Clinics East, Inc. &nbsp;·&nbsp; Website Intro</div>

  </div><!-- /scene -->

  <script>
    // ── Replay function ──────────────────────────────────────────
    function replayIntro() {
      const el = document.querySelectorAll(
        '#outer-diamond, #inscribed-square, #inner-diamond, ' +
        '.facet-line, #center-table, #logo-mark-group, ' +
        '.wordmark-container, .tagline, .corner, .replay-btn, .bg-glow'
      );
      el.forEach(e => {
        e.style.animation = 'none';
        e.offsetHeight; // force reflow
        e.style.animation = '';
      });
    }

    // ── Auto-loop (optional — comment out if you want single play) ──
    // setTimeout(() => { setInterval(replayIntro, 7000); }, 5500);
  </script>
</body>
</html>

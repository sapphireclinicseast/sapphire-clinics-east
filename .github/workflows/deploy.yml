# ══════════════════════════════════════════════════════════════════
#  SAPPHIRE CLINICS EAST — Deploy to Netcup VPS
#
#  Runs automatically on every push to main (including CMS commits).
#  Replaces Netlify's build-and-deploy pipeline.
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    VPS_HOST        — your Netcup VPS IP address
#    VPS_USER        — SSH username (usually root or debian)
#    VPS_SSH_KEY     — private SSH key (see setup guide in scripts/setup-vps.sh)
# ══════════════════════════════════════════════════════════════════

name: Deploy to Netcup VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repo ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build content indexes from CMS markdown files ─────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build content indexes
        run: node scripts/build-content.js

      # ── 3. Set up SSH agent ──────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Sync files to VPS (rsync — fast incremental updates) ──
      - name: Deploy files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='.claude' \
            --exclude='*.sh' \
            --exclude='nginx.conf' \
            --exclude='COMPANY LOGO/node_modules' \
            --exclude='COMPANY LOGO/package*.json' \
            --exclude='COMPANY LOGO/capture-intro.mjs' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/sapphireclinicseast.org/

      # ── 5. Reload Nginx to pick up any config changes ────────────
      - name: Reload Nginx
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo systemctl reload nginx || sudo nginx -s reload"

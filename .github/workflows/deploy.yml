# ══════════════════════════════════════════════════════════════════
#  SAPPHIRE CLINICS EAST — Deploy to Netcup VPS
#
#  Runs automatically on every push to main (including CMS commits).
#  Replaces Netlify's build-and-deploy pipeline.
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    VPS_HOST        — your Netcup VPS IP address
#    VPS_USER        — SSH username (usually root or debian)
#    VPS_SSH_KEY     — private SSH key (see setup guide in scripts/setup-vps.sh)
# ══════════════════════════════════════════════════════════════════

name: Deploy to Netcup VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repo ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build content indexes from CMS markdown files ─────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build content indexes
        run: node scripts/build-content.js

      # ── 3. Set up SSH key directly ───────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Sync files to VPS (rsync — fast incremental updates) ──
      - name: Deploy files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='.claude' \
            --exclude='*.sh' \
            --exclude='nginx.conf' \
            --exclude='COMPANY LOGO/node_modules' \
            --exclude='COMPANY LOGO/package*.json' \
            --exclude='COMPANY LOGO/capture-intro.mjs' \
            --exclude='api/node_modules' \
            --exclude='data/' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/sapphireclinicseast.org/

      # ── 5. Update Nginx config & reload ─────────────────────────
      - name: Update Nginx config
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            scripts/nginx.conf \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/nginx/sites-available/sapphireclinicseast.org
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ln -sf /etc/nginx/sites-available/sapphireclinicseast.org /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx"

      # ── 6. Install survey API deps & start/restart ─────────────────
      - name: Setup & Restart Survey API
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'mkdir -p /var/www/sapphireclinicseast.org/data && \
             cd /var/www/sapphireclinicseast.org/api && \
             npm install --production && \
             if pm2 describe scei-survey >/dev/null 2>&1; then \
               pm2 restart scei-survey; \
             else \
               SURVEY_API_KEY=${SURVEY_API_KEY:-SCEI_SURVEY_KEY_2025} pm2 start survey-api.js --name scei-survey && pm2 save; \
             fi && \
             if [ ! -f /var/www/sapphireclinicseast.org/data/surveys.db ]; then \
               node seed-data.js; \
             fi'

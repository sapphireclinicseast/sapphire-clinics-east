# ══════════════════════════════════════════════════════════════════
#  Nginx — Sapphire Clinics East, Inc.
#  sapphireclinicseast.org
#
#  INSTALL:
#    sudo cp /var/www/sapphireclinicseast.org/scripts/nginx.conf \
#            /etc/nginx/sites-available/sapphireclinicseast.org
#    sudo ln -s /etc/nginx/sites-available/sapphireclinicseast.org \
#               /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sapphireclinicseast.org www.sapphireclinicseast.org;

    # Allow Let's Encrypt ACME challenge through
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Everything else → HTTPS
    location / {
        return 301 https://sapphireclinicseast.org$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sapphireclinicseast.org;

    ssl_certificate     /etc/letsencrypt/live/sapphireclinicseast.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sapphireclinicseast.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sapphireclinicseast.org$request_uri;
}

# ── Main site ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sapphireclinicseast.org;

    root  /var/www/sapphireclinicseast.org;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/sapphireclinicseast.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sapphireclinicseast.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ── Static file serving ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── CMS admin panel ──────────────────────────────────────────
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── GitHub OAuth proxy (for CMS login) ──────────────────────
    #    Forwards /oauth and /oauth/callback to the Node.js proxy
    #    running on localhost:3030
    location /oauth {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Satisfaction Survey API ──────────────────────────────────
    #    Forwards /api/survey/* to the Node.js survey API
    #    running on localhost:3031
    location /api/survey {
        proxy_pass         http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Long-cache for versioned assets ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── No-cache for HTML (always fresh) ────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── No-cache for content JSON (CMS posts) ───────────────────
    location ~* -index\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/sapphireclinicseast.access.log;
    error_log  /var/log/nginx/sapphireclinicseast.error.log;
}
